apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base/deployment.yaml
  - ../../base/service.yaml
  - ../../base/configmap.yaml
  - ../../base/secrets.yaml

namePrefix: config-

commonLabels:
  app: config-server

images:
  - name: IMAGE_NAME
    newTag: latest

configMapGenerator:
  - name: config-config
    behavior: merge
    literals:
      - SPRING_PROFILES_ACTIVE=local

secretGenerator:
  - name: config-secrets
    behavior: merge
    literals:
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=test1234

