apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      initContainers:
          - name: wait-for-postgres
            image: busybox:1.36
            command:
              - sh
              - -c
              - until nc -z postgres-server 5432; do echo "Waiting for postgres..."; sleep 2; done
            resources:
              limits:
                cpu: "100m"
                memory: "64Mi"
      containers:
      - name: api-gateway
        image: api-gateway
        resources:
          requests:
              cpu: "250m"
              memory: "512Mi"
          limits:
              cpu: "1"
              memory: "1Gi"