apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: ecommerce
data:
  SPRING_DATA_REDIS_HOST: redis-server
  SPRING_DATA_REDIS_PORT: "6379"
  application.yml: |
    spring:
      cloud:
        gateway:
          routes:
            - id: user-service
              uri: http://user-service
              predicates:
                - Path=/api/v1/user/**
            - id: product-service
              uri: http://product-service
              predicates:
                - Path=/api/v1/product/**
            - id: order-service
              uri: http://order-service
              predicates:
                - Path=/api/v1/orders/**
            - id: payment-service
              uri: http://payment-service
              predicates:
                - Path=/api/v1/payment/**
        openfeign:
          client:
            config:
              user-service:
                url: http://user-service
              product-service:
                url: http://product-service
              order-service:
                url: http://order-service
              payment-service:
                url: http://payment-service
              default:
                connectTimeout: 5000
                readTimeout: 5000
    eureka:
      client:
        enabled: false
        register-with-eureka: false
        fetch-registry: false
