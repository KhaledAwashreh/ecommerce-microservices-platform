apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base/deployment.yaml
  - ../../base/service.yaml
  - ../../base/configmap.yaml
  - ../../base/secrets.yaml

namePrefix: product-

commonLabels:
  app: product-service

images:
  - name: IMAGE_NAME
    newTag: latest

configMapGenerator:
  - name: product-config
    behavior: merge
    literals:
      - SPRING_PROFILES_ACTIVE=local

secretGenerator:
  - name: product-secrets
    behavior: merge
    literals:
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=test1234

