# Base Service Template
# Customize SERVICE_NAME, SERVICE_TYPE, and ports per service
apiVersion: v1
kind: Service
metadata:
  name: SERVICE_NAME
  namespace: ecommerce
  labels:
    app: SERVICE_NAME
spec:
  type: SERVICE_TYPE          # ClusterIP, NodePort, LoadBalancer
  selector:
    app: SERVICE_NAME
  ports:
  - port: SERVICE_PORT        # Service port (e.g., 8080)
    targetPort: CONTAINER_PORT # Container port (e.g., 8080)
    protocol: TCP
