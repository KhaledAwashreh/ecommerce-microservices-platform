# Base ConfigMap Template
# Customize SERVICE_NAME and values per service
apiVersion: v1
kind: ConfigMap
metadata:
  name: SERVICE_NAME-config
  namespace: ecommerce
data:
  SPRING_PROFILES_ACTIVE: "PROFILE"           # e.g., local, dev, prod
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka:8761/eureka"  # Eureka URL
  ZIPKIN_BASE_URL: "http://zipkin:9411"      # Zipkin URL
