# Base Deployment Template
# Customize SERVICE_NAME, IMAGE_NAME:TAG, CONTAINER_PORT, and resources per service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: SERVICE_NAME
  namespace: ecommerce
  labels:
    app: SERVICE_NAME
spec:
  replicas: REPLICA_COUNT
  selector:
    matchLabels:
      app: SERVICE_NAME
  template:
    metadata:
      labels:
        app: SERVICE_NAME
    spec:
      containers:
      - name: SERVICE_NAME
        image: IMAGE_NAME:TAG
        ports:
        - containerPort: CONTAINER_PORT
        envFrom:
        - configMapRef:
            name: SERVICE_NAME-config
        - secretRef:
            name: SERVICE_NAME-secrets
        resources:
          requests:
            memory: "MEMORY_REQUEST"  # e.g., 256Mi, 512Mi, 1Gi
            cpu: "CPU_REQUEST"        100m, 250m, 500 # e.g.,m
          limits:
            memory: "MEMORY_LIMIT"    # e.g., 512Mi, 1Gi, 2Gi
            cpu: "CPU_LIMIT"          # e.g., 500m, 1000m, 2
