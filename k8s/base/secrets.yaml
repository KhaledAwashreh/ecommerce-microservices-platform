# Base Secret Template
# Customize SERVICE_NAME and credentials per service
# NOTE: For production, use external secrets operator or vault
apiVersion: v1
kind: Secret
metadata:
  name: SERVICE_NAME-secrets
  namespace: ecommerce
type: Opaque
stringData:
  SPRING_DATASOURCE_USERNAME: "postgres"    # DB username
  SPRING_DATASOURCE_PASSWORD: "test1234"   # DB password
