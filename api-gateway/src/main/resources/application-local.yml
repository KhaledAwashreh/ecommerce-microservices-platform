spring:
  application:
    name: api-gateway
  data:
    redis:
      host: redis
      port: 6379
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: user-service
          uri: http://user-service:8080
          predicates:
            - Path=/api/v1/user/**,/api/v1/Address/**
          filters:
            - name: Retry
              args:
                retries: 3
                methods: GET,POST
            - name: CircuitBreaker
              args:
                name: user-service
                fallbackUri: forward:/fallback

        - id: product-service
          uri: http://product-service:8080
          predicates:
            - Path=/api/v1/product/**,/api/v1/productReview/**,/api/v1/categories/**,/api/v1/inventory/**
          filters:
            - name: Retry
              args:
                retries: 3
                methods: GET,POST
            - name: CircuitBreaker
              args:
                name: product-service
                fallbackUri: forward:/fallback

        - id: order-service
          uri: http://order-service:8080
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - name: Retry
              args:
                retries: 3
                methods: GET,POST
            - name: CircuitBreaker
              args:
                name: order-service
                fallbackUri: forward:/fallback

        - id: payment-service
          uri: http://payment-service:8080
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - name: Retry
              args:
                retries: 3
                methods: GET,POST
            - name: CircuitBreaker
              args:
                name: payment-service
                fallbackUri: forward:/fallback

        - id: frontend-service
          uri: http://frontend-service:3000
          predicates:
            - Path=/**

server:
  port: 8765

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

resilience4j:
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
        cancelRunningFuture: true
    instances:
      user-service:
        baseConfig: default
      product-service:
        baseConfig: default
      order-service:
        baseConfig: default
      payment-service:
        baseConfig: default
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 20
        failureRateThreshold: 50
        slowCallRateThreshold: 80
        waitDurationInOpenState: 10s
        slowCallDurationThreshold: 2s
        permittedNumberOfCallsInHalfOpenState: 5
    instances:
      user-service:
        baseConfig: default
      product-service:
        baseConfig: default
      order-service:
        baseConfig: default
      payment-service:
        baseConfig: default

logging:
  pattern:
    level: "%5p [${spring.application.name}, %X{traceId:-}, %X{spanId:-}]"
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: DEBUG
    io.github.resilience4j: DEBUG
