version: "3.9"

name: ecommerce-platform

services:

  # ==========================
  # Observability
  # ==========================
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    environment:
      STORAGE_TYPE: mem
    networks:
      - ecommerce-network

  # ==========================
  # Database Layer (Unified - matches k8s)
  # ==========================
  postgres-server:
    image: postgres:15
    container_name: postgres-server
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test1234
      POSTGRES_DB: Ecommerce
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  redis-server:
    image: redis:7-alpine
    container_name: redis-server
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ecommerce-network

  redisinsight:
    image: redislabs/redisinsight:latest
    container_name: redisinsight
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redisinsight-data:/data
    depends_on:
      redis-server:
        condition: service_healthy
    networks:
      - ecommerce-network

  # ==========================
  # API Gateway (matches k8s config)
  # ==========================
  api-gateway:
    container_name: api-gateway
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      - ZIPKIN_BASE_URL=http://zipkin:9411
      - SPRING_DATA_REDIS_HOST=redis-server
      - SPRING_DATA_REDIS_PORT=6379
      - USER_SERVICE_URL=http://user-service:8080
      - PRODUCT_SERVICE_URL=http://product-service:8080
      - ORDER_SERVICE_URL=http://order-service:8080
      - PAYMENT_SERVICE_URL=http://payment-service:8080
      - EUREKA_CLIENT_ENABLED=false
    depends_on:
      postgres-server:
        condition: service_healthy
      redis-server:
        condition: service_healthy
    networks:
      - ecommerce-network

  # ==========================
  # Business Services (matches k8s config)
  # ==========================
  user-service:
    container_name: user-service
    build:
      context: ./user-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - ZIPKIN_BASE_URL=http://zipkin:9411
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-server:5432/userdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=test1234
      - SPRING_DATA_REDIS_HOST=redis-server
      - SPRING_DATA_REDIS_PORT=6379
      - EUREKA_CLIENT_ENABLED=false
    depends_on:
      postgres-server:
        condition: service_healthy
      redis-server:
        condition: service_healthy
    networks:
      - ecommerce-network

  product-service:
    container_name: product-service
    build:
      context: ./product-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - ZIPKIN_BASE_URL=http://zipkin:9411
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-server:5432/productdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=test1234
      - SPRING_DATA_REDIS_HOST=redis-server
      - SPRING_DATA_REDIS_PORT=6379
      - EUREKA_CLIENT_ENABLED=false
    depends_on:
      postgres-server:
        condition: service_healthy
      redis-server:
        condition: service_healthy
    networks:
      - ecommerce-network

  order-service:
    container_name: order-service
    build:
      context: ./order-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - ZIPKIN_BASE_URL=http://zipkin:9411
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-server:5432/orderdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=test1234
      - SPRING_DATA_REDIS_HOST=redis-server
      - SPRING_DATA_REDIS_PORT=6379
      - PRODUCT_SERVICE_URL=http://product-service:8080
      - PAYMENT_SERVICE_URL=http://payment-service:8080
      - EUREKA_CLIENT_ENABLED=false
    depends_on:
      postgres-server:
        condition: service_healthy
      redis-server:
        condition: service_healthy
    networks:
      - ecommerce-network

  payment-service:
    container_name: payment-service
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - ZIPKIN_BASE_URL=http://zipkin:9411
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-server:5432/paymentdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=test1234
      - SPRING_DATA_REDIS_HOST=redis-server
      - SPRING_DATA_REDIS_PORT=6379
      - EUREKA_CLIENT_ENABLED=false
    depends_on:
      postgres-server:
        condition: service_healthy
      redis-server:
        condition: service_healthy
    networks:
      - ecommerce-network

  frontend-service:
    container_name: frontend-service
    build:
      context: ./frontend-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - API_GATEWAY_BASE-URL=http://api-gateway:8765
      - EUREKA_CLIENT_ENABLED=false
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - ecommerce-network

# ==========================
# Networks
# ==========================
networks:
  ecommerce-network:
    driver: bridge

# ==========================
# Volumes
# ==========================
volumes:
  postgres-data:
  redis-data:
  redisinsight-data:
