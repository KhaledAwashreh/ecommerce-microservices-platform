<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:htmx="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - E-Commerce</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-primary { background: #FF9900; color: black; }
        .btn-primary:hover { background: #F08800; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <div class="bg-gray-900 text-white py-4">
        <div class="max-w-7xl mx-auto px-4">
            <a href="/" class="text-2xl font-bold text-yellow-400">Marketplace</a>
        </div>
    </div>

    <div class="flex-1 flex items-center justify-center py-12 px-4">
        <div class="max-w-md w-full">
            <div class="bg-white rounded-lg shadow-md p-8">
                <h2 class="text-2xl font-bold text-center mb-6">Sign in</h2>
                
                <div id="login-error" th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                    <p th:text="${error}">Invalid credentials</p>
                </div>

                <form action="/login" method="post" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Username</label>
                        <input type="text" name="username" required
                               class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-yellow-500 focus:border-yellow-500">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Password</label>
                        <input type="password" name="password" required
                               class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-yellow-500 focus:border-yellow-500">
                    </div>
                    
                    <button type="submit" class="w-full btn-primary py-2 px-4 rounded font-bold hover:bg-yellow-600 transition">
                        Continue
                    </button>
                </form>
                
                <p class="mt-4 text-center text-sm text-gray-600">
                    New to Marketplace? 
                    <a href="/register" class="text-blue-600 hover:underline">Create your account</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
