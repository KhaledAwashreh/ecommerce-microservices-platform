<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:htmx="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Addresses - E-Commerce</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-link:hover { color: #FF9900 !important; }
        .btn-primary { background: #FF9900; color: black; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <div th:replace="~{layout/base :: navbar}"></div>

    <div class="flex-1 max-w-7xl mx-auto w-full px-4 py-6">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold">Your Addresses</h1>
            <button onclick="document.getElementById('add-address-modal').classList.remove('hidden')" 
                    class="btn-primary px-4 py-2 rounded font-bold">
                Add New Address
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div th:each="address : ${addresses}" class="bg-white rounded-lg shadow-sm p-6 border-2" 
                 th:classappend="${address.defaultAddress} ? 'border-yellow-500' : 'border-transparent'">
                <div class="flex items-start justify-between">
                    <div>
                        <span th:if="${address.defaultAddress}" class="bg-yellow-500 text-black text-xs px-2 py-1 rounded font-bold">Default</span>
                        <p class="font-medium mt-2" th:text="${address.street}">123 Main Street</p>
                        <p class="text-gray-600" th:text="${address.city + ', ' + address.state + ' ' + address.postalCode}">New York, NY 10001</p>
                        <p class="text-gray-600" th:text="${address.country}">United States</p>
                        <p class="text-gray-500 text-sm mt-2" th:text="${address.phoneNumber}">+1 234 567 8900</p>
                    </div>
                </div>
                <div class="mt-4 flex space-x-4">
                    <button class="text-sm text-blue-600 hover:underline">Edit</button>
                    <form action="/addresses/delete" method="post">
                        <input type="hidden" name="addressId" th:value="${address.id}">
                        <button type="submit" class="text-sm text-red-600 hover:underline">Delete</button>
                    </form>
                    <button th:if="${!address.defaultAddress}" class="text-sm text-gray-600 hover:underline">Set as Default</button>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(addresses)}" class="col-span-full bg-white rounded-lg shadow-sm p-12 text-center">
                <span class="text-4xl block mb-4">📍</span>
                <p class="text-gray-500 mb-4">You haven't added any addresses yet</p>
                <button onclick="document.getElementById('add-address-modal').classList.remove('hidden')" 
                        class="btn-primary px-6 py-2 rounded font-bold">Add Your First Address</button>
            </div>
        </div>
    </div>

    <div id="add-address-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-lg p-6 max-w-md w-full mx-4">
            <h2 class="text-xl font-bold mb-4">Add New Address</h2>
            <form action="/addresses/add" method="post" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Street Address</label>
                    <input type="text" name="street" required class="mt-1 w-full border rounded px-3 py-2">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">City</label>
                        <input type="text" name="city" required class="mt-1 w-full border rounded px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">State</label>
                        <input type="text" name="state" required class="mt-1 w-full border rounded px-3 py-2">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Postal Code</label>
                        <input type="text" name="postalCode" required class="mt-1 w-full border rounded px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Country</label>
                        <input type="text" name="country" required value="USA" class="mt-1 w-full border rounded px-3 py-2">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Phone Number</label>
                    <input type="tel" name="phoneNumber" required class="mt-1 w-full border rounded px-3 py-2">
                </div>
                <div class="flex items-center">
                    <input type="checkbox" name="defaultAddress" id="defaultAddress" class="h-4 w-4 text-yellow-500">
                    <label for="defaultAddress" class="ml-2 text-sm text-gray-700">Set as default address</label>
                </div>
                <div class="flex space-x-4 pt-2">
                    <button type="submit" class="flex-1 btn-primary py-2 rounded font-bold">Save Address</button>
                    <button type="button" onclick="document.getElementById('add-address-modal').classList.add('hidden')" 
                            class="flex-1 border py-2 rounded font-bold hover:bg-gray-50">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div th:replace="~{layout/base :: footer}"></div>
</body>
</html>
