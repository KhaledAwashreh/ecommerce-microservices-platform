<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:htmx="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Account - E-Commerce</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-link:hover { color: #FF9900 !important; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <div th:replace="~{layout/base :: navbar}"></div>

    <div class="flex-1 max-w-7xl mx-auto w-full px-4 py-6">
        <h1 class="text-2xl font-bold mb-6">Your Account</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2">
                <div class="bg-white rounded-lg shadow-sm p-6 mb-6">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-bold">Personal Information</h2>
                        <button class="text-sm text-blue-600 hover:underline">Edit</button>
                    </div>
                    <div class="space-y-2">
                        <p><span class="font-medium">Name:</span> <span th:text="${user.name}">John Doe</span></p>
                        <p><span class="font-medium">Email:</span> <span th:text="${user.email}">john@example.com</span></p>
                        <p><span class="font-medium">Phone:</span> <span th:text="${user.phone}">+1 234 567 8900</span></p>
                        <p><span class="font-medium">Username:</span> <span th:text="${user.username}">johndoe</span></p>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow-sm p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-bold">Address Book</h2>
                        <a href="/addresses" class="text-sm text-blue-600 hover:underline">Manage Addresses</a>
                    </div>
                    <div th:if="${addresses != null && !#lists.isEmpty(addresses)}" class="space-y-3">
                        <div th:each="addr : ${addresses}" class="border rounded p-3" th:classappend="${addr.defaultAddress} ? 'border-yellow-500 bg-yellow-50' : ''">
                            <p th:text="${addr.street}">123 Main St</p>
                            <p th:text="${addr.city + ', ' + addr.state + ' ' + addr.postalCode}">City, State 12345</p>
                            <p th:text="${addr.country}">USA</p>
                            <span th:if="${addr.defaultAddress}" class="text-xs bg-yellow-500 text-black px-2 py-0.5 rounded mt-1 inline-block">Default</span>
                        </div>
                    </div>
                    <div th:if="${addresses == null || #lists.isEmpty(addresses)}" class="text-gray-500">
                        No addresses saved
                    </div>
                </div>
            </div>

            <div>
                <div class="bg-white rounded-lg shadow-sm p-6">
                    <h2 class="text-lg font-bold mb-4">Quick Links</h2>
                    <div class="space-y-3">
                        <a href="/orders" class="block py-2 border-b hover:text-yellow-600">Your Orders</a>
                        <a href="/addresses" class="block py-2 border-b hover:text-yellow-600">Addresses</a>
                        <a href="/cart" class="block py-2 border-b hover:text-yellow-600">Shopping Cart</a>
                        <a href="#" class="block py-2 border-b hover:text-yellow-600">Wishlist</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{layout/base :: footer}"></div>
</body>
</html>
