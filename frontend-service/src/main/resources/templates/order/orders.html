<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:htmx="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Orders - E-Commerce</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-link:hover { color: #FF9900 !important; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <div th:replace="~{layout/base :: navbar}"></div>

    <div class="flex-1 max-w-7xl mx-auto w-full px-4 py-6">
        <h1 class="text-2xl font-bold mb-6">Your Orders</h1>

        <div class="space-y-4">
            <div th:each="order : ${orders}" class="bg-white rounded-lg shadow-sm p-6">
                <div class="flex items-center justify-between border-b pb-4 mb-4">
                    <div>
                        <p class="text-sm text-gray-500">Order placed</p>
                        <p class="font-medium" th:text="${#temporals.format(order.createdAt, 'MMM dd, yyyy')}">Jan 15, 2024</p>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500">Total</p>
                        <p class="font-bold" th:text="${'$' + order.totalPrice}">$129.99</p>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500">Status</p>
                        <span th:class="${'px-2 py-1 rounded text-xs font-bold ' + 
                            (order.status == 'CONFIRMED' ? 'bg-green-100 text-green-800' : 
                             order.status == 'CANCELLED' ? 'bg-red-100 text-red-800' : 
                             'bg-yellow-100 text-yellow-800')}"
                              th:text="${order.status}">PENDING</span>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500">Order #</p>
                        <p class="font-mono text-sm" th:text="${#strings.abbreviate(order.id, 8)}">abc123</p>
                    </div>
                </div>

                <div class="space-y-3">
                    <div th:each="item : ${order.selectedItems}" class="flex items-center">
                        <div class="h-16 w-16 bg-gray-200 rounded flex items-center justify-center">
                            <span class="text-xl">📦</span>
                        </div>
                        <div class="ml-4 flex-1">
                            <p class="font-medium" th:text="${'Product SKU: ' + item.productSku}">Product</p>
                            <p class="text-sm text-gray-500" th:text="${'Qty: ' + item.quantity}">Qty: 2</p>
                        </div>
                        <p class="font-medium" th:text="${'$' + item.unitPrice}">$29.99</p>
                    </div>
                </div>

                <div class="mt-4 flex space-x-4">
                    <button class="text-sm text-blue-600 hover:underline">View Order Details</button>
                    <button class="text-sm text-blue-600 hover:underline">Invoice</button>
                    <button th:if="${order.status == 'PENDING'}" class="text-sm text-red-600 hover:underline">Cancel Order</button>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(orders)}" class="bg-white rounded-lg shadow-sm p-12 text-center">
                <span class="text-4xl block mb-4">📦</span>
                <p class="text-gray-500 mb-4">You haven't placed any orders yet</p>
                <a href="/products" class="inline-block bg-yellow-500 text-black px-6 py-2 rounded font-bold hover:bg-yellow-600">Start Shopping</a>
            </div>
        </div>
    </div>

    <div th:replace="~{layout/base :: footer}"></div>
</body>
</html>
