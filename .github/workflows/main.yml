name: build-and-test
on:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ecommerce
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test1234
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout source
        uses: actions/checkout@v4             # ← pulls your code

      - name: Set up Java 21
        uses: actions/setup-java@v4           # ← pins the JDK version
        with:
          distribution: temurin
          java-version: '21'

      - name: Clear Maven cache
        run: rm -rf ~/.m2/repository

      - name: Debug Java & Maven info
        run: |
          java -version
          mvn -version
          mvn dependency:tree | grep lombok

      - name: Run tests
        run: mvn clean verify

      - name: Upload artifact
        uses: actions/upload-artifact@v4      # ← saves the JAR/WAR
        with:
          name: app
          path: '**/target/*.jar'

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: "**/target/site/jacoco/**"

