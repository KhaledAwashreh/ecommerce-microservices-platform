name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - '**.java'
      - 'pom.xml'
      - '**/Dockerfile'
      - '.github/workflows/docker.yml'
  pull_request:
    branches:
      - main
    paths:
      - '**.java'
      - 'pom.xml'
      - '**/Dockerfile'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Custom tag to build and push'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  version:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      short_sha: ${{ steps.version.outputs.SHORT_SHA }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version and SHA
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout 2>/dev/null || echo "0.0.0")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "SHA=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=${GITHUB_SHA:0:8}" >> $GITHUB_OUTPUT

  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: version
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            dockerfile: api-gateway/Dockerfile
            context: .
          - service: user-service
            dockerfile: user-service/Dockerfile
            context: .
          - service: product-service
            dockerfile: product-service/Dockerfile
            context: .
          - service: order-service
            dockerfile: order-service/Dockerfile
            context: .
          - service: payment-service
            dockerfile: payment-service/Dockerfile
            context: .
          - service: frontend-service
            dockerfile: frontend-service/Dockerfile
            context: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=${{ needs.version.outputs.version }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version, build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Release v${{ needs.version.outputs.version }}
          draft: false
          prerelease: false
          body: |
            ## Docker Images

            Pull images from GHCR:

            ```bash
            docker pull ghcr.io/${{ env.IMAGE_NAME }}/api-gateway:latest
            docker pull ghcr.io/${{ env.IMAGE_NAME }}/user-service:latest
            docker pull ghcr.io/${{ env.IMAGE_NAME }}/product-service:latest
            docker pull ghcr.io/${{ env.IMAGE_NAME }}/order-service:latest
            docker pull ghcr.io/${{ env.IMAGE_NAME }}/payment-service:latest
            docker pull ghcr.io/${{ env.IMAGE_NAME }}/frontend-service:latest
            ```

            Built with commit: ${{ github.sha }}